<!-- ============ MODAL: Criar / Editar Tipo de Perfil ============ -->
<!-- Aberto por abrirCriarPerfil()/abrirEditarPerfil(id) (ver
     public/js/perfis-customizados.js), de dentro de Configurações →
     Usuários. O catálogo de itens (páginas, dashboards, sub-itens,
     "Outros", Configurações) vem de GET /catalogo-permissoes — nada aqui
     é hardcoded em HTML, pra nunca ficar dessincronizado da fonte única de
     verdade (lib/itens-permissao.js). z-index maior que o de
     Configurações (999) porque abre POR CIMA dele, sem fechá-lo. -->
<div id="criar-perfil-modal"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1050;align-items:center;justify-content:center">
  <div
    style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:760px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.6)">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-shrink:0">
      <h2 id="cp-titulo" style="font-family:var(--font-display);font-size:1.3rem;color:var(--accent);letter-spacing:.08em">
        ➕ CRIAR NOVO TIPO DE PERFIL</h2>
      <button onclick="fecharCriarPerfil()"
        style="background:none;border:none;color:var(--text-3);font-size:1.4rem;cursor:pointer;line-height:1">✕</button>
    </div>

    <div style="overflow-y:auto;flex:1;padding-right:4px">
      <p style="font-size:.8rem;color:var(--text-3);margin-bottom:16px;line-height:1.5">
        Marque, item por item, o que este perfil pode fazer: <strong>Acesso Total</strong> (vê e edita/registra),
        <strong>Apenas Visualizar</strong> (vê a tela, sem poder editar/registrar) ou <strong>Ocultar</strong>
        (nem aparece pra esse perfil). Item não marcado fica <strong>Oculto</strong> por padrão.
      </p>

      <div class="form-group">
        <label class="form-label">Nome do Perfil</label>
        <input class="form-input" id="cp-nome" placeholder="Ex: Líder de Turno">
      </div>
      <div id="cp-erro" style="display:none;color:var(--red);font-size:.82rem;margin:10px 0"></div>

      <div id="cp-catalogo" style="margin-top:12px;display:flex;flex-direction:column;gap:20px">
        <span style="color:var(--text-3);font-size:.82rem">Carregando catálogo de permissões...</span>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;flex-shrink:0">
      <button class="btn btn-ghost" onclick="fecharCriarPerfil()">Cancelar</button>
      <button class="btn btn-primary" id="cp-btn-salvar" onclick="salvarPerfilCustomizado()">Salvar Perfil</button>
    </div>
  </div>
</div>
<!-- ============ /MODAL: Criar / Editar Tipo de Perfil ============ -->
