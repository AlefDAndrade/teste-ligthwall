<!-- ============ PAGE: RELATÓRIO DE BERÇOS ============ -->
    <main class="main" id="page-relatorio-bercos">
      <div class="page-header" style="position:relative">
        <h1 class="page-title">Relatório de <span>Berços</span></h1>
        <p class="page-desc">Resultado visual (Okay/Vazou) de cada berço, por bateria já registrada</p>
      </div>

      <div class="page-body">

        <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
          <button class="btn btn-ghost btn-sm" onclick="showPage('analise-bercos')" title="Ver totais de vazamento, pontos recorrentes e insights automáticos">
            💧 Ver em Dashboard</button>
        </div>

        <div class="card mb-4" style="padding:16px 20px">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <input class="form-input" type="date" id="rb-data-inicio" style="width:150px" title="Data início">
            <span style="color:var(--text-3);font-size:.85rem">até</span>
            <input class="form-input" type="date" id="rb-data-fim" style="width:150px" title="Data fim">
            <button class="btn btn-ghost btn-sm" id="btn-rb-filtrar">Filtrar</button>
            <!-- Populados em JS a partir dos dados carregados (ver
                 _popularSelect(), relatorio-bercos.js) — só mostram tipos
                 de montagem/baterias que de fato aparecem nos registros. -->
            <select class="form-input form-select" id="rb-tipo-montagem" style="width:170px" title="Tipo de Montagem">
              <option value="">Todas as montagens</option>
            </select>
            <select class="form-input form-select" id="rb-tipo-bateria" style="width:150px" title="Bateria">
              <option value="">Todas as baterias</option>
            </select>
            <select class="form-input form-select" id="rb-vazamento" style="width:160px" title="Vazamento">
              <option value="">Vazamento: todos</option>
              <option value="com">Com vazamento</option>
              <option value="sem">Sem vazamento</option>
            </select>
            <input class="form-input" type="text" id="rb-id-operacao" placeholder="ID da Operação…" style="width:150px" title="Buscar pelo ID da operação">
            <button class="btn btn-ghost btn-sm" id="btn-rb-limpar">✕ Limpar</button>
            <button class="btn btn-ghost btn-sm" id="btn-rb-modo-visual" title="Mostra o desenho de cada berço, colorido conforme o tipo de montagem, em vez da tabela">🎨 Modo Visual</button>
            <div style="margin-left:auto;display:flex;gap:10px;align-items:center">
              <span style="font-size:.78rem;color:var(--text-3)" id="rb-count"></span>
            </div>
          </div>
        </div>

        <!-- Cabeçalho montado em JS (relatorio-bercos.js) — B1..B22, cada um
             com 2 sub-colunas (Esquerda/Direita) — ver _construirThead(). -->
        <div class="table-wrap">
          <table id="relatorio-bercos-table">
            <thead>
              <tr id="relatorio-bercos-thead-topo"></tr>
              <tr id="relatorio-bercos-thead-sub"></tr>
            </thead>
            <tbody id="relatorio-bercos-tbody">
              <tr>
                <td colspan="46" style="text-align:center;color:var(--text-3);padding:30px">Carregando...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Modo Visual: 1 card por bateria, com o desenho colorido dos
             berços (mesma grade/estilo de "Bateria Atual" — .ba-grid/
             .ba-celula/.ba-dot, ver styles.css) em vez da tabela. Montado
             e escondido/mostrado por relatorio-bercos.js (_renderVisual/
             _aplicarModoVisual) — começa escondido; alterna com a tabela
             ao clicar em "🎨 Modo Visual", sem precisar buscar os dados
             de novo (os dois já ficam prontos a cada render()). -->
        <div id="relatorio-bercos-visual" style="display:none"></div>

      </div>
    </main>
