  <!-- ============ MODAL: EDITAR OPERAÇÃO ============ -->
  <div id="editar-operacao-modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center">
    <div
      style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent);letter-spacing:.05em">✏️
          EDITAR OPERAÇÃO</h2>
        <button onclick="fecharEdicaoOperacao()"
          style="background:none;border:none;color:var(--text-3);font-size:1.4rem;cursor:pointer;line-height:1">✕</button>
      </div>

      <div id="eo-erro"
        style="display:none;margin-bottom:16px;padding:12px 16px;background:rgba(239,68,68,.08);border:1px solid var(--red-dim);border-radius:var(--radius);color:var(--red);font-size:.85rem">
      </div>

      <!-- Dados capturados automaticamente / calculados — somente leitura -->
      <div
        style="background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:18px">
        <div style="font-weight:700;color:var(--text);font-size:.8rem;margin-bottom:8px">📌 Capturados
          automaticamente / calculados (não editáveis aqui)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.82rem;color:var(--text-2)">
          <div>Data: <strong id="eo-ro-data" class="mono">—</strong></div>
          <div>Traços: <strong id="eo-ro-tracos" class="mono">—</strong></div>
          <div>Início: <strong id="eo-ro-inicio" class="mono">—</strong></div>
          <div>Fim: <strong id="eo-ro-fim" class="mono">—</strong></div>
          <div>Previsão Desemplaque: <strong id="eo-ro-desemplaque" class="mono">—</strong></div>
          <div>Duração: <strong id="eo-ro-duracao" class="mono">—</strong></div>
          <div>Houve atraso: <strong id="eo-ro-atraso" class="mono">—</strong></div>
        </div>
      </div>

      <!-- Campos editáveis -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">ID Bateria</label>
          <select class="form-select" id="eo-id-bateria" onchange="_eoAoMudarBateria()"></select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Berços Reais</label>
          <input class="form-input" type="number" id="eo-bercos-reais" oninput="_eoAoEditarBercosManualmente()">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Tipo de Montagem</label>
          <select class="form-select" id="eo-tipo-montagem" onchange="_eoAtualizarPreview()"></select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Turno</label>
          <select class="form-select" id="eo-turno">
            <option>1º TURNO</option>
            <option>2º TURNO</option>
            <option>3º TURNO</option>
          </select>
        </div>
      </div>

      <div id="eo-motivo-atraso-wrap" style="margin-bottom:12px;display:none">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Motivo do Atraso</label>
          <input class="form-input" id="eo-motivo-atraso">
        </div>
      </div>

      <!-- Preview do recálculo automático -->
      <div
        style="background:var(--bg-2);border:1px solid var(--accent-dim);border-radius:var(--radius);padding:14px;margin:16px 0;font-size:.82rem;color:var(--text-2)">
        <div style="font-weight:700;color:var(--accent);font-size:.8rem;margin-bottom:8px">⚙ Recalculado
          automaticamente, ao salvar</div>
        <div id="eo-preview" style="display:flex;flex-direction:column;gap:3px"></div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:12px">
        <button class="btn btn-ghost" onclick="fecharEdicaoOperacao()">Cancelar</button>
        <button class="btn btn-danger" id="eo-btn-salvar" onclick="salvarEdicaoOperacao()">Salvar Alterações</button>
      </div>

    </div>
  </div>
